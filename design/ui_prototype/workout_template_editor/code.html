<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Trainlytics | 模板编辑器</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#0e0e0e",
                        "on-error": "#490006",
                        "on-tertiary-container": "#000000",
                        "on-error-container": "#ffa8a3",
                        "tertiary-fixed-dim": "#77a1ff",
                        "surface-container-low": "#131313",
                        "on-primary": "#005d2c",
                        "on-secondary": "#47545a",
                        "error-dim": "#d7383b",
                        "on-primary-container": "#004f24",
                        "inverse-surface": "#fcf9f8",
                        "on-tertiary": "#001d4e",
                        "secondary-fixed": "#d7e4ec",
                        "surface-container-high": "#20201f",
                        "surface-bright": "#2c2c2c",
                        "outline-variant": "#484847",
                        "secondary-dim": "#c9d6de",
                        "error-container": "#9f0519",
                        "surface-container": "#1a1a1a",
                        "primary": "#3fff8b",
                        "surface-container-lowest": "#000000",
                        "on-surface": "#ffffff",
                        "inverse-primary": "#006e35",
                        "surface-dim": "#0e0e0e",
                        "secondary": "#d7e4ec",
                        "on-tertiary-fixed-variant": "#003580",
                        "primary-dim": "#24f07e",
                        "primary-fixed-dim": "#24f07e",
                        "error": "#ff716c",
                        "primary-fixed": "#3fff8b",
                        "secondary-container": "#3c494f",
                        "tertiary": "#6e9bff",
                        "on-secondary-fixed": "#354147",
                        "tertiary-fixed": "#8eafff",
                        "on-background": "#ffffff",
                        "surface-variant": "#262626",
                        "primary-container": "#13ea79",
                        "outline": "#767575",
                        "on-secondary-container": "#c5d2da",
                        "surface-container-highest": "#262626",
                        "on-tertiary-fixed": "#00163d",
                        "tertiary-dim": "#0f6df3",
                        "tertiary-container": "#2778fe",
                        "background": "#0e0e0e",
                        "secondary-fixed-dim": "#c9d6de",
                        "on-surface-variant": "#adaaaa",
                        "on-primary-fixed-variant": "#006832",
                        "inverse-on-surface": "#565555",
                        "surface-tint": "#3fff8b",
                        "on-primary-fixed": "#004820",
                        "on-secondary-fixed-variant": "#515d64"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #3fff8b 0%, #13ea79 100%);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0e0e0e; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 selection:text-primary">
<!-- TopAppBar -->
<header class="bg-[#0e0e0e] fixed top-0 w-full z-50">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-outline-variant/20">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
</div>
<h1 class="font-['Manrope'] font-semibold tracking-tight text-on-surface text-2xl font-bold text-[#00E676] tracking-tighter">Trainlytics</h1>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-xl hover:bg-[#1a1a1a] transition-colors text-[#3fff8b]">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-3xl mx-auto">
<!-- Editor Header -->
<div class="mb-10">
<div class="flex items-center justify-between mb-6">
<a class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-sm">arrow_back_ios</span>
<span class="font-label text-sm font-medium">返回模板列表</span>
</a>
<div class="flex gap-3">
<button class="px-4 py-2 text-error font-medium hover:bg-error/10 rounded-xl transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-lg">delete</span>
                        删除
                    </button>
<button class="kinetic-gradient px-6 py-2 rounded-xl text-on-primary-container font-bold text-sm tracking-wide shadow-lg shadow-primary/10 active:scale-95 duration-200">
                        保存模板
                    </button>
</div>
</div>
<div class="space-y-6">
<div class="group">
<label class="block text-[11px] uppercase tracking-widest text-on-surface-variant font-bold mb-2 ml-1">模板名称</label>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 text-3xl font-headline font-extrabold tracking-tight px-1 py-2 transition-all placeholder:text-surface-container-highest" placeholder="输入模板名称..." type="text" value="推日训练"/>
</div>
<div class="group">
<label class="block text-[11px] uppercase tracking-widest text-on-surface-variant font-bold mb-2 ml-1">备注与目标</label>
<textarea class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 text-on-surface font-body leading-relaxed px-1 py-2 transition-all resize-none placeholder:text-surface-container-highest" placeholder="专注于胸部的渐进性负荷..." rows="2"></textarea>
</div>
</div>
</div>
<!-- Exercise List -->
<div class="space-y-4">
<div class="flex items-center justify-between mb-2 px-1">
<h2 class="font-headline font-bold text-lg text-on-surface">动作</h2>
<span class="text-[11px] font-bold text-on-surface-variant uppercase tracking-widest">已添加 3 个动作</span>
</div>
<!-- Exercise Card 1 -->
<div class="bg-surface-container-low rounded-xl p-5 border border-outline-variant/10 group">
<div class="flex justify-between items-start mb-4">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined">fitness_center</span>
</div>
<div>
<h3 class="font-headline font-bold text-on-surface">杠铃卧推</h3>
<p class="text-[11px] text-on-surface-variant uppercase tracking-tighter font-semibold">胸部 • 复合动作</p>
</div>
</div>
<button class="p-2 text-on-surface-variant hover:text-error transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="grid grid-cols-12 gap-3 mb-4 text-[10px] font-bold text-on-surface-variant uppercase tracking-widest px-2">
<div class="col-span-1 text-center">组数</div>
<div class="col-span-4 text-center">次数</div>
<div class="col-span-4 text-center">重量 (%)</div>
<div class="col-span-3"></div>
</div>
<div class="space-y-2">
<div class="grid grid-cols-12 gap-3 items-center bg-surface-container px-3 py-2 rounded-lg">
<div class="col-span-1 text-center font-bold text-primary">1</div>
<div class="col-span-4">
<input class="w-full bg-surface-container-highest border-0 rounded-md text-center text-sm font-bold focus:ring-1 focus:ring-primary py-1" type="number" value="8"/>
</div>
<div class="col-span-4">
<input class="w-full bg-surface-container-highest border-0 rounded-md text-center text-sm font-bold focus:ring-1 focus:ring-primary py-1" type="number" value="85"/>
</div>
<div class="col-span-3 flex justify-end">
<button class="text-on-surface-variant/40 hover:text-error transition-colors"><span class="material-symbols-outlined text-lg">remove_circle</span></button>
</div>
</div>
<div class="grid grid-cols-12 gap-3 items-center bg-surface-container px-3 py-2 rounded-lg">
<div class="col-span-1 text-center font-bold text-primary">2</div>
<div class="col-span-4">
<input class="w-full bg-surface-container-highest border-0 rounded-md text-center text-sm font-bold focus:ring-1 focus:ring-primary py-1" type="number" value="8"/>
</div>
<div class="col-span-4">
<input class="w-full bg-surface-container-highest border-0 rounded-md text-center text-sm font-bold focus:ring-1 focus:ring-primary py-1" type="number" value="85"/>
</div>
<div class="col-span-3 flex justify-end">
<button class="text-on-surface-variant/40 hover:text-error transition-colors"><span class="material-symbols-outlined text-lg">remove_circle</span></button>
</div>
</div>
</div>
<button class="w-full mt-4 py-2 border border-dashed border-outline-variant/30 rounded-lg text-xs font-bold text-on-surface-variant hover:text-primary hover:border-primary/40 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">add</span>
                    添加组数
                </button>
</div>
<!-- Exercise Card 2 -->
<div class="bg-surface-container-low rounded-xl p-5 border border-outline-variant/10 group">
<div class="flex justify-between items-start mb-4">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined">fitness_center</span>
</div>
<div>
<h3 class="font-headline font-bold text-on-surface">杠铃推举</h3>
<p class="text-[11px] text-on-surface-variant uppercase tracking-tighter font-semibold">肩部 • 复合动作</p>
</div>
</div>
<button class="p-2 text-on-surface-variant hover:text-error transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="space-y-2">
<div class="grid grid-cols-12 gap-3 items-center bg-surface-container px-3 py-2 rounded-lg">
<div class="col-span-1 text-center font-bold text-primary">1</div>
<div class="col-span-4">
<input class="w-full bg-surface-container-highest border-0 rounded-md text-center text-sm font-bold focus:ring-1 focus:ring-primary py-1" placeholder="次数" type="number"/>
</div>
<div class="col-span-4">
<input class="w-full bg-surface-container-highest border-0 rounded-md text-center text-sm font-bold focus:ring-1 focus:ring-primary py-1" placeholder="重量" type="number"/>
</div>
<div class="col-span-3 flex justify-end">
<button class="text-on-surface-variant/40 hover:text-error transition-colors"><span class="material-symbols-outlined text-lg">remove_circle</span></button>
</div>
</div>
</div>
<button class="w-full mt-4 py-2 border border-dashed border-outline-variant/30 rounded-lg text-xs font-bold text-on-surface-variant hover:text-primary hover:border-primary/40 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">add</span>
                    添加组数
                </button>
</div>
<!-- Add Exercise CTA -->
<button class="w-full bg-surface-container-high hover:bg-surface-container-highest border border-outline-variant/20 py-6 rounded-2xl flex flex-col items-center justify-center gap-2 transition-all active:scale-[0.98]">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">add</span>
</div>
<span class="font-headline font-bold text-sm tracking-wide">添加动作</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#0e0e0e]/70 backdrop-blur-xl shadow-[0px_-12px_32px_rgba(0,0,0,0.4)] border-t border-white/5">
<a class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:text-[#3fff8b] transition-all" href="#">
<span class="material-symbols-outlined mb-1">calendar_today</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">今日</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:text-[#3fff8b] transition-all" href="#">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">历史</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:text-[#3fff8b] transition-all" href="#">
<span class="material-symbols-outlined mb-1">analytics</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">洞察</span>
</a>
<a class="flex flex-col items-center justify-center text-[#3fff8b] bg-[#1a1a1a] rounded-xl px-3 py-1 scale-95 duration-200" href="#">
<span class="material-symbols-outlined mb-1">description</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">模板</span>
</a>
</nav>
</body></html>
